name: Midnight Backup

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar xlsx
        run: npm install xlsx

      - name: Criar pasta
        run: mkdir -p backups

      - name: Baixar backup
        run: |
          curl https://apimit.onrender.com/backup \
          -o backups/backup-$(date +'%Y-%m-%d-%H-%M').json

      - name: Gerar Excel
        run: node gerar_excel.js

      - name: Auto Commit das Alterações
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Backup automatizado salvo com sucesso"
          branch: main
          commit_user_name: "GitHub Actions"
          commit_user_email: "actions@github.com"
