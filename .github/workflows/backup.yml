name: Midnight Backup

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar xlsx
        run: npm install xlsx

      - name: Criar pasta
        run: mkdir -p backups

      - name: Baixar backup
        run: |
          curl https://apimit.onrender.com/backup \
          -o backups/backup-$(date +'%Y-%m-%d-%H-%M').json

      - name: Gerar Excel
        run: node gerar_excel.js

      - name: Commit e Push Definitivo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Garante sincronização antes de mexer em arquivos
          git pull origin main --rebase
          
          git add backups/
          
          if ! git diff --cached --quiet; then
            git commit -m "Backup $(date)"
            git push origin main
          else
            echo "Nenhuma alteração detectada."
          fi
